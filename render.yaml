services:
  - type: web
    name: resumescreener
    env: python
    plan: free
    buildCommand: pip install -r requirements-web.txt
    startCommand: gunicorn resumescreener.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: resumescreener.settings
      - key: USE_SQLITE
        value: "1"
      - key: DJANGO_ALLOWED_HOSTS
        value: "*"
